// ---------- 语音播报 ----------
let currentCard = null;
let voices = [];
function loadVoices() {
  voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith("en"));
}
if ("speechSynthesis" in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, card) {
  if (!("speechSynthesis" in window)) {
    alert("当前浏览器不支持语音播报");
    return;
  }
  speechSynthesis.cancel();
  const clean = text.replace(/\.\.\./g, "").replace(/[()（）]/g, " ").trim();
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = "en-GB";
  utter.rate = 0.85;
  utter.pitch = 1;
  const preferred = voices.find(v => /en-GB/i.test(v.lang)) || voices.find(v => /en/i.test(v.lang));
  if (preferred) utter.voice = preferred;

  if (currentCard) currentCard.classList.remove("playing");
  currentCard = card;
  if (card) {
    card.classList.add("playing");
    utter.onend = () => card.classList.remove("playing");
    utter.onerror = () => card.classList.remove("playing");
  }
  speechSynthesis.speak(utter);
}

const content = document.getElementById("content");
const unitNav = document.getElementById("unitNav");

  unitNav.appendChild(navA);

  const title = document.createElement("div");
  title.className = "unit-title";

  const total = u.words.length + u.phrases.length;
  title.innerHTML = `<span class="badge">Unit ${u.unit}</span><span class="count">${u.words.length} 个单词 · ${u.phrases.length} 个词组</span>`;
  content.appendChild(title);

  const wLabel = document.createElement("div");
  wLabel.className = "section-label";
  wLabel.textContent = "单词 WORDS";
  content.appendChild(wLabel);

  u.words.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="word-main">
        <div class="word-row">

});
